<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Video</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .box {
      width: 100%;
      max-width: 900px;
      background: #1c1c1c;
      border-radius: 12px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    /* YOUR GREEN COLOR */
    .warning-text {
      margin: 12px 0 18px 0;
      font-size: 18px;
      font-weight: bold;
      color: #00ff51;
    }

    p {
      color: #ccc;
    }

    input[type="password"] {
      width: 100%;
      max-width: 300px;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #videoSection {
      display: none;
      margin-top: 20px;
    }

    iframe {
      width: 100%;
      height: 480px;
      border-radius: 10px;
      background: black;
    }

    .note {
      font-size: 14px;
      color: #999;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Private Video</h1>

    <div class="warning-text">
      Notice: Unauthorized recording, copying, downloading, or sharing of this video may be monitored, investigated, and used as evidence in legal proceedings.
    </div>

    <p>Enter the password to watch the video.</p>

    <div id="loginSection">
      <input type="password" id="passwordInput" placeholder="Enter password">
      <br>
      <button onclick="checkPassword()">Enter</button>
    </div>

    <div id="videoSection">
      <iframe 
        src="https://drive.google.com/file/d/1_PB87L1Yps9JgZF0lf3wbN3k7C16MKdD/preview"
        allow="autoplay">
      </iframe>

      <div class="note">Right-click is disabled. Download button is hidden.</div>
    </div>
  </div>

  <script>
    const correctPassword = "2233";

    function checkPassword() {
      const entered = document.getElementById("passwordInput").value;
      if (entered === correctPassword) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("videoSection").style.display = "block";
      } else {
        alert("Wrong password");
      }
    }

    document.addEventListener("contextmenu", function(event) {
      event.preventDefault();
    });

    document.addEventListener("keydown", function(event) {
      if (
        event.key === "F12" ||
        (event.ctrlKey && event.shiftKey && ["I", "J", "C"].includes(event.key.toUpperCase())) ||
        (event.ctrlKey && event.key.toUpperCase() === "U")
      ) {
        event.preventDefault();
      }
    });
  </script>
</body>
</html>
